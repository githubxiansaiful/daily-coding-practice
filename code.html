<script>
    document.addEventListener('DOMContentLoaded', function () {
        $(function () {
            $(".xs-custom-button-inner")
                .on("mouseenter", function (e) {
                    var parentOffset = $(this).offset(),
                        relX = e.pageX - parentOffset.left,
                        relY = e.pageY - parentOffset.top;
                    $(this).find("span").css({ top: relY, left: relX });
                })
                .on("mouseout", function (e) {
                    var parentOffset = $(this).offset(),
                        relX = e.pageX - parentOffset.left,
                        relY = e.pageY - parentOffset.top;
                    $(this).find("span").css({ top: relY, left: relX });
                });
        });
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const nextBtn = document.querySelector(".cwg-next");
        const prevBtn = document.querySelector(".cwg-prev");
        const steps = document.querySelectorAll(".cwg-step");

        if (nextBtn) {
            nextBtn.addEventListener("click", function () {
                steps[0].classList.remove("active");
                steps[1].classList.add("active");
            });
        }

        if (prevBtn) {
            prevBtn.addEventListener("click", function () {
                steps[1].classList.remove("active");
                steps[0].classList.add("active");
            });
        }

    });
</script>

<script>
    (function () {
        function fitLogo(el) {
            // find the container we want to fit into (the row)
            var container = el.closest('.row') || el.parentElement;
            if (!container) return;

            // available width inside the row
            var containerStyles = getComputedStyle(container);
            var maxWidth = container.clientWidth
                - parseFloat(containerStyles.paddingLeft)
                - parseFloat(containerStyles.paddingRight);

            // binary search for best font size
            var min = 10;    // px
            var max = 1000;  // px

            while (min <= max) {
                var mid = (min + max) / 2;
                el.style.fontSize = mid + 'px';

                if (el.scrollWidth > maxWidth) {
                    max = mid - 1;
                } else {
                    min = mid + 1;
                }
            }

            el.style.fontSize = max + 'px';
        }

        function fitAllLogos() {
            var logos = document.querySelectorAll('.footer-large-logo');
            logos.forEach
                ? logos.forEach(fitLogo)
                : Array.prototype.forEach.call(logos, fitLogo);
        }

        window.addEventListener('load', fitAllLogos);
        window.addEventListener('resize', fitAllLogos);
    })();
</script>

<!-- Footer Menu Animation Auto -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".nav-anim").forEach(link => {

            const text = link.textContent.trim();
            link.textContent = "";

            const container = document.createElement("span");

            function createLine() {
                const line = document.createElement("span");

                [...text].forEach(letter => {
                    const span = document.createElement("span");
                    span.innerHTML = letter === " " ? "&nbsp;" : letter;
                    line.appendChild(span);
                });

                return line;
            }

            container.appendChild(createLine());
            container.appendChild(createLine());

            link.appendChild(container);

        });
    })
</script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const titles = document.querySelectorAll(".home-blog .entry-title");

        titles.forEach(title => {
            let text = title.textContent.trim();
            let words = text.split(" ");

            if (words.length >= 4) {
                words[2] = "<strong>" + words[2] + "</strong>"; // 3rd word
                words[3] = "<strong>" + words[3] + "</strong>"; // 4th word

                title.innerHTML = words.join(" ");
            }
        });
    });
</script>
<script>

    document.addEventListener("DOMContentLoaded", function () {

        document.querySelectorAll('.clients-review .dica-item').forEach(function (item) {

            const imageContainer = item.querySelector('.dica-image-container');
            const title = item.querySelector('.item-title');
            const subtitle = item.querySelector('.item-subtitle');

            if (imageContainer && title && subtitle) {

                // create wrapper div
                const authInfo = document.createElement('div');
                authInfo.classList.add('review-auth-info');

                // move title + subtitle into wrapper
                authInfo.appendChild(title);
                authInfo.appendChild(subtitle);

                // append wrapper to image container
                imageContainer.appendChild(authInfo);

            }

        });

    });
</script>
