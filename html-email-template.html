<ul class="menu">
    <li><a href="#" class="btn-anim">Home</a></li>
    <li><a href="#" class="btn-anim">About</a></li>
    <li><a href="#" class="btn-anim">Services</a></li>
    <li><a href="#" class="btn-anim">FAQ</a></li>
    <li><a href="#" class="btn-anim">Contact US</a></li>
</ul>
<style>
    ul {
        list-style: none;
        padding: 0;
    }

    ul li {
        margin: 10px 0;
    }

    ul li a {
        text-decoration: none;
        font-size: 24px;
        color: #000;
    }

    .btn-caption {
        display: block;
        height: 30px;
        overflow: hidden;
    }

    .btn-anim__letter {
        display: inline-block;
        transition: transform .5s cubic-bezier(0.76, 0, 0.024, 1);
    }

    .btn-anim:hover .btn-anim__letter {
        transform: translateY(-100%);
    }

    /* stagger animation */
    .btn-anim__letter:nth-child(1) {
        transition-delay: 0s
    }

    .btn-anim__letter:nth-child(2) {
        transition-delay: .03s
    }

    .btn-anim__letter:nth-child(3) {
        transition-delay: .06s
    }

    .btn-anim__letter:nth-child(4) {
        transition-delay: .09s
    }

    .btn-anim__letter:nth-child(5) {
        transition-delay: .12s
    }

    .btn-anim__letter:nth-child(6) {
        transition-delay: .15s
    }

    .btn-anim__letter:nth-child(7) {
        transition-delay: .18s
    }

    .btn-anim__letter:nth-child(8) {
        transition-delay: .21s
    }

    .btn-anim__letter:nth-child(9) {
        transition-delay: .24s
    }

    .btn-anim__letter:nth-child(10) {
        transition-delay: .27s
    }
</style>

<script>
    document.querySelectorAll(".btn-anim").forEach(link => {

        const text = link.textContent.trim();
        link.textContent = "";

        const caption = document.createElement("span");
        caption.className = "btn-caption";

        function createBlock() {
            const block = document.createElement("div");

            [...text].forEach(letter => {
                const span = document.createElement("span");
                span.className = "btn-anim__letter";
                span.innerHTML = letter === " " ? "&nbsp;" : letter;
                block.appendChild(span);
            });

            return block;
        }

        caption.appendChild(createBlock());
        caption.appendChild(createBlock());

        link.appendChild(caption);

    });
</script>
