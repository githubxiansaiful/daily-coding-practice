<script>
    document.addEventListener("DOMContentLoaded", function () {
        const section = document.querySelector(".footer-carousel-section");
        if (!section) return;

        const images = [
            "https://owencladding.co.uk/wp-content/uploads/2026/03/PYRAMIDS-EXTENDED.jpeg",
            "https://owencladding.co.uk/wp-content/uploads/2026/03/IMAGE-STONEHENGE.jpg",
            "https://owencladding.co.uk/wp-content/uploads/2026/03/IMAGE-ACROPOLIS.jpg"
        ];

        const track = document.createElement("div");
        track.classList.add("carousel-track");

        const allImages = [...images, ...images];

        allImages.forEach(src => {
            const item = document.createElement("div");
            item.classList.add("carousel-item");
            item.style.backgroundImage = `url(${src})`;
            track.appendChild(item);
        });

        section.appendChild(track);
    });
</script>
<script>
    jQuery(function ($) {
        $(document).ready(function () {
            $("body ul.et_mobile_menu li.menu-item-has-children, body ul.et_mobile_menu  li.page_item_has_children").append('<a href="#" class="mobile-toggle"></a>');
            $('ul.et_mobile_menu li.menu-item-has-children .mobile-toggle, ul.et_mobile_menu li.page_item_has_children .mobile-toggle').click(function (event) {
                event.preventDefault();
                $(this).parent('li').toggleClass('dt-open');
                $(this).parent('li').find('ul.children').first().toggleClass('visible');
                $(this).parent('li').find('ul.sub-menu').first().toggleClass('visible');
            });
            iconFINAL = 'P';
            $('body ul.et_mobile_menu li.menu-item-has-children, body ul.et_mobile_menu li.page_item_has_children').attr('data-icon', iconFINAL);
            $('.mobile-toggle').on('mouseover', function () {
                $(this).parent().addClass('is-hover');
            }).on('mouseout', function () {
                $(this).parent().removeClass('is-hover');
            })
        });
    });
</script>

<!-- Footer text -->
<script>
    (function () {
        function fitLogo(el) {
            // find the container we want to fit into (the row)
            var container = el.closest('.row') || el.parentElement;
            if (!container) return;

            // available width inside the row
            var containerStyles = getComputedStyle(container);
            var maxWidth = container.clientWidth
                - parseFloat(containerStyles.paddingLeft)
                - parseFloat(containerStyles.paddingRight);

            // binary search for best font size
            var min = 10;    // px
            var max = 1000;  // px

            while (min <= max) {
                var mid = (min + max) / 2;
                el.style.fontSize = mid + 'px';

                if (el.scrollWidth > maxWidth) {
                    max = mid - 1;
                } else {
                    min = mid + 1;
                }
            }

            el.style.fontSize = max + 'px';
        }

        function fitAllLogos() {
            var logos = document.querySelectorAll('.footer-large-logo');
            logos.forEach
                ? logos.forEach(fitLogo)
                : Array.prototype.forEach.call(logos, fitLogo);
        }

        window.addEventListener('load', fitAllLogos);
        window.addEventListener('resize', fitAllLogos);
    })();
</script>
