<!DOCTYPE html>
<html>
<head>
<style>
body {
  /* Set a large height to enable page scrolling */
  height: 2000px;
  background-image: url("https://owencladding.co.uk/wp-content/uploads/2026/03/OWEN-HOME-PAGE-HEADER-IMAGE-MASTER.jpg");
  background-repeat: no-repeat;
  /* The default value, but explicitly set for demonstration */
  background-attachment: scroll; 
}

.content {
  padding: 50px;
  background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent content area */
}
</style>
</head>
<body>

<div class="content">
  <h1>Background Attachment: Scroll</h1>
  <p>Scroll down the page. The background image will scroll along with this text.</p>
  <!-- Add more content here to force scrolling -->
  <p style="margin-top: 1500px;">End of the page content.</p>
</div>

</body>
</html>
