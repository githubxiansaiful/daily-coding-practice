<div class="xs-owen-form">
    <div class="xsw-grid-inputs">
        <div class="xsw-input-group">
            [text* text-name autocomplete:name placeholder "Name"]
        </div>
        <div class="xsw-input-group">
            [email* text-email autocomplete:email placeholder "Email"]
        </div>
        <div class="xsw-input-group">
            [text* text-company autocomplete:organization placeholder "Company"]
        </div>
        <div class="xsw-input-group">
            [text* text-phone autocomplete:tel placeholder "Phone"]
        </div>
    </div>
</div>
