<script>
    document.addEventListener('DOMContentLoaded', function () {
        function stopVideo(iframeID) {
            var iframe = document.getElementById(iframeID);
            if (iframe) {
                var src = iframe.src;
                iframe.src = src;
            }
        }

        /* When popup closes */
        jQuery(document).on('click', '.pfd-close', function () {

            stopVideo('video1frame');
            stopVideo('video2frame');
            stopVideo('video3frame');

        });

    })
</script>
